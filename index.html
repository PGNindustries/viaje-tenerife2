<head>
<meta charset="UTF-8">

<title>Tenerife · Itinerario 2–7 agosto</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ocean:#0b2637;--ocean-2:#12384f;--basalt:#10151b;--lava:#ff6b35;
    --paper:#fbf8f2;--card:#ffffff;--ink:#1b2228;--muted:#75818a;
    --line:#e9e2d4;
    --d1:#e8543a;--d2:#1f8a8a;--d3:#7a53a8;--d4:#e0952b;--d5:#2c8fbf;--d6:#4c8a3f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{background:var(--ocean);color:#fff;padding:13px 24px;display:flex;align-items:center;
    justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;z-index:5}
  header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,var(--d1),var(--d2),var(--d3),var(--d4),var(--d5),var(--d6))}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;letter-spacing:.16em}
  .brand .tag{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#8fb4c8}
  .meta{font-family:'Space Mono',monospace;font-size:11px;color:#a9c3d1;line-height:1.75;text-align:right}
  .meta b{color:#fff;font-weight:700}
  .tabs{display:flex;background:var(--basalt);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1 0 auto;min-width:128px;border:none;cursor:pointer;background:transparent;color:#8b97a0;
    padding:12px 18px 11px;text-align:left;border-bottom:3px solid transparent;transition:background .16s,color .16s}
  .tab:hover{background:rgba(255,255,255,.04);color:#d7dee2}
  .tab .n{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;display:block;opacity:.85}
  .tab .t{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;margin-top:3px;line-height:1.2;display:block}
  .tab[data-i="0"]{--a:var(--d1)}.tab[data-i="1"]{--a:var(--d2)}.tab[data-i="2"]{--a:var(--d3)}
  .tab[data-i="3"]{--a:var(--d4)}.tab[data-i="4"]{--a:var(--d5)}.tab[data-i="5"]{--a:var(--d6)}
  .tab.active{background:var(--paper);color:var(--ink);border-bottom-color:var(--a)}
  .tab.active .n{color:var(--a)}
  main{flex:1;display:flex;min-height:0}
  #map{flex:1.6;min-width:0;background:#dfe7ea}
  .panel{flex:1;max-width:440px;min-width:330px;background:var(--paper);border-left:1px solid var(--line);overflow-y:auto}
  .panel-inner{padding:0 26px 40px}
  .hero{height:150px;display:block;position:relative;overflow:hidden}
  .hero svg{width:100%;height:100%;display:block}
  .hero .cap{position:absolute;left:14px;bottom:11px;color:#fff;font-family:'Space Mono',monospace;
    font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.55)}
  .eyebrow{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-top:20px;display:block}
  h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;line-height:1.14;margin:6px 0 3px}
  .date{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--muted);margin-bottom:15px}
  .desc{font-size:13.5px;line-height:1.62;color:#3c464d;margin-bottom:20px}
  .timeline{border-left:2px solid var(--line);margin-left:7px}
  .stop{position:relative;padding:0 0 2px 26px;margin-left:2px}
  .stop .dot{position:absolute;left:-11px;top:0;width:20px;height:20px;border-radius:50%;background:var(--accent);
    color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;
    justify-content:center;box-shadow:0 0 0 3px var(--paper)}
  .stop.base .dot,.stop.air .dot{background:var(--ocean)}
  .stop .name{font-weight:600;font-size:13.5px;line-height:1.3}
  .stop .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .leg{padding:6px 0 6px 26px;margin-left:2px;font-family:'Space Mono',monospace;font-size:11px;
    color:var(--lava);display:flex;align-items:center;gap:6px}
  .leg span{color:var(--muted)}
  .notes{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:15px 17px;box-shadow:0 1px 2px rgba(20,30,40,.03)}
  .notes h3{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;display:flex;align-items:center;
    gap:7px;margin-bottom:9px;color:var(--ocean);text-transform:uppercase;letter-spacing:.06em}
  .notes ul{list-style:none}
  .notes li{font-size:12.5px;line-height:1.5;color:#434c53;padding-left:15px;position:relative;margin-bottom:7px}
  .notes li:last-child{margin-bottom:0}
  .notes li::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .route-note{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:18px;
    padding-top:12px;border-top:1px dashed var(--line);line-height:1.6}
  .pin{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;
    justify-content:center;box-shadow:0 3px 6px rgba(0,0,0,.35);border:2px solid #fff}
  .pin span{transform:rotate(45deg);color:#fff;font-family:'Space Mono',monospace;font-weight:700;font-size:12px}
  .pin.base,.pin.air{border-radius:6px;transform:rotate(0);background:var(--ocean)!important}
  .pin.base span,.pin.air span{transform:none;font-size:14px}
  .leaflet-popup-content{font-family:'Inter',sans-serif;font-size:13px;margin:11px 13px}
  .leaflet-popup-content b{font-family:'Space Grotesk',sans-serif}
  .pop-role{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);display:block;margin-top:3px}
  @media (max-width:860px){
    body{overflow:auto;height:auto}main{flex-direction:column}
    #map{height:54vh;flex:none}.panel{max-width:none;min-width:0;border-left:none}
    header{padding:12px 16px}.meta{text-align:left}
  }
</style>
</head>

const HAS_MAP=(typeof L!=='undefined');
let map=null,layer=null;const routeCache={};
const TILE_PROVIDERS=[
{url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',opts:{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap &copy; CARTO'}},
{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',opts:{subdomains:'abc',maxZoom:19,attribution:'&copy; OpenStreetMap'}}
];
function addTiles(idx){
  const p=TILE_PROVIDERS[idx];const tl=L.tileLayer(p.url,p.opts);let errs=0;
  tl.on('tileerror',()=>{errs++;if(errs>4&&idx+1<TILE_PROVIDERS.length){map.removeLayer(tl);addTiles(idx+1);}});
  tl.addTo(map);
}
if(HAS_MAP){
  map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([28.29,-16.55],10);
  addTiles(0);layer=L.layerGroup().addTo(map);
  window.addEventListener('load',()=>setTimeout(()=>map.invalidateSize(),200));
}else{
  document.getElementById('map').innerHTML="<div style='height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#0b2637;color:#a9c3d1;text-align:center;padding:24px;font-family:Space Mono,monospace;font-size:13px;line-height:1.7'><div style='font-size:30px'>🗺️</div>El mapa necesita conexión a internet.<br>Ábrelo conectado para ver la ruta interactiva.<br>El itinerario sigue disponible a la derecha.</div>";
}
function pinIcon(color,label,role){
  const cls=(role==='base'||role==='air')?'pin '+role:'pin';
  const bg=(role==='base'||role==='air')?'':`background:${color};`;
  const inner=role==='air'?'✈':(role==='base'?'★':label);
  return L.divIcon({className:'',html:`<div class="${cls}" style="${bg}"><span>${inner}</span></div>`,
    iconSize:[26,26],iconAnchor:[13,(role==='base'||role==='air')?13:26],popupAnchor:[0,(role==='base'||role==='air')?-12:-26]});
}
async function fetchRoute(stops){
  const key=stops.map(s=>s.lat+','+s.lng).join('|');if(routeCache[key])return routeCache[key];
  const coords=stops.map(s=>`${s.lng},${s.lat}`).join(';');
  const url=`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;
  try{const r=await fetch(url);if(!r.ok)throw 0;const j=await r.json();
    routeCache[key]={line:j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),real:true};
  }catch(e){routeCache[key]={line:stops.map(s=>[s.lat,s.lng]),real:false};}
  return routeCache[key];
}
async function renderDay(i){
  const day=DAYS[i],color=COLORS[i];
  document.querySelectorAll('.tab').forEach((t,k)=>t.classList.toggle('active',k===i));
  let real=true;
  if(HAS_MAP){
    layer.clearLayers();let n=0;
    day.stops.forEach(s=>{let lbl='';if(s.role==='stop'){n++;lbl=n;}
      L.marker([s.lat,s.lng],{icon:pinIcon(color,lbl,s.role)}).addTo(layer)
        .bindPopup(`<b>${s.name}</b><span class="pop-role">${s.sub||''}</span>`);});
    const route=await fetchRoute(day.stops);real=route.real;
    L.polyline(route.line,{color:'#fff',weight:8,opacity:.4,lineJoin:'round'}).addTo(layer);
    L.polyline(route.line,{color:color,weight:4,opacity:.9,lineJoin:'round'}).addTo(layer);
    map.invalidateSize();
    map.fitBounds(L.latLngBounds(day.stops.map(s=>[s.lat,s.lng])),{padding:[55,55]});
  }
  renderPanel(i,real);
}
function arrow(color){return `<svg width='10' height='10' viewBox='0 0 10 10'><path d='M5 0 L5 8 M2 5 L5 8 L8 5' stroke='${color}' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>`;}
function renderPanel(i,real){
  const day=DAYS[i],color=COLORS[i];let n=0,tl='';
  day.stops.forEach(s=>{
    const lbl=s.role==='air'?'✈':(s.role==='base'?'★':(++n));
    tl+=`<div class="stop ${s.role}"><div class="dot" style="${s.role==='stop'?`background:${color}`:''}">${lbl}</div>
      <div class="name">${s.name}</div>${s.sub?`<div class="sub">${s.sub}</div>`:''}</div>`;
    if(s.leg)tl+=`<div class="leg">${arrow(color)}<b>${s.leg}</b><span>en coche</span></div>`;
  });
  const notes=day.notes.map(x=>`<li>${x}</li>`).join('');
  const routeTxt=real?'Ruta sobre carreteras reales · tiempos aproximados':'Sin conexión al servicio de rutas: línea directa · tiempos aproximados';
  const p=document.getElementById('panel');p.style.setProperty('--accent',color);
  p.innerHTML=`<div class="hero">${SCENES[i]}<span class="cap">${day.scene}</span></div>
    <span class="eyebrow">Día ${i+1}</span><h2>${day.title}</h2><div class="date">${day.date}</div>
    <p class="desc">${day.desc}</p><div class="timeline">${tl}</div>
    <div class="notes"><h3>◈ Bueno a saber</h3><ul>${notes}</ul></div>
    <div class="route-note">${routeTxt}</div>`;
  document.querySelector('.panel').scrollTop=0;
}
const tabsEl=document.getElementById('tabs');
DAYS.forEach((d,i)=>{const b=document.createElement('button');b.className='tab';b.dataset.i=i;
  b.innerHTML=`<span class="n">Día ${i+1}</span><span class="t">${d.title}</span>`;
  b.onclick=()=>renderDay(i);tabsEl.appendChild(b);});
renderDay(0);
</script>
</body>
</html>
